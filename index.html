<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InyTwの森林檔案夾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="icon" type="image/png" href="assets/images/o_o.png">
</head>

<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="assets/mp4/anime-girls-with-cats.3840x2160.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <div class="text-center relative z-10 max-w-2xl w-full">
        <div class="mb-8 inline-block animate__animated animate__zoomIn">
            <div class="w-28 h-28 md:w-36 md:h-36 rounded-full border-4 border-white/20 p-1 backdrop-blur-md shadow-2xl overflow-hidden">
                <img src="assets/images/kasane-teto.gif" alt="Avatar" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="animate__animated animate__fadeInUp">
            <h1 class="text-4xl md:text-6xl font-black glow-text mb-2">InyTwの森林檔案夾</h1>
            <p class="text-white/70 font-medium tracking-[0.4em] text-xs md:text-sm">選擇要傳送的傳送門</p>
        </div>

        <div class="grid grid-cols-2 gap-6 mt-12 animate__animated animate__fadeInUp animate__delay-1s">
            <a href="socials.html" class="nav-card p-6 rounded-[2rem] group">
                <div class="text-4xl mb-3 transition group-hover:scale-125">🐱</div>
                <div class="text-white font-bold tracking-widest">連結傳送門</div>
                <div class="text-white/40 text-[10px] mt-1 font-light">Community & SNS</div>
            </a>
            <a href="games.html" class="nav-card p-6 rounded-[2rem] group">
                <div class="text-4xl mb-3 transition group-hover:scale-125">🎮</div>
                <div class="text-white font-bold tracking-widest">遊戲資訊傳送門</div>
                <div class="text-white/40 text-[10px] mt-1 font-light">Game Status</div>
            </a>
        </div>

        <div class="mt-16 text-white/20 text-[10px] tracking-widest animate__animated animate__fadeIn animate__delay-2s">
            <p>© 2026 OHW NETWORK PROJECT. ALL RIGHTS RESERVED.</p>
        </div>
    </div>

</body>
</html>
